<!-- PLANTILLA BASE para cada diapositiva -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACExchanger — Diapositiva X</title>
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="slide-wrapper">

  <!-- NAV (igual en todas) -->
  <nav class="nav">
    <span class="nav-brand">ACExchanger</span>
    <div class="nav-center">
      <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
      <span class="counter" id="counter"></span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="nav-btn" id="prevBtn" onclick="prevSlide()">← Anterior</button>
      <button class="nav-btn" id="nextBtn" onclick="nextSlide()">Siguiente →</button>
    </div>
  </nav>

  <!-- CONTENIDO (cambia en cada slide) -->
  <div class="slide-content">
    <!-- TU CONTENIDO AQUÍ -->
  </div>

</div>
<script src="../assets/nav.js"></script>
</body>
</html>
